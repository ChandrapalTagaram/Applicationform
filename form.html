
<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Form</title>
</head>
<body>
	<h1 style="text-align: center;"><u>Registration Form</u></h1>

	<form name="My Form">
		First name:
		<input type="text" name="fn">
		<br>
		<br>
		Last name:
		<input type="text" name="ln" placeholder="enter your first name">
		<br>
		<br>
		Password:
		<input type="password" name="password">
		<br>
		<br>
		<h3>Gender:</h3>
		<input type="Radio" name="gender" value="male" checked>Male
		<input type="Radio" name="gender" value="female" >Female

		<br>

		<h3>Skils :</h3>

		<input type="checkbox" name="skills" value="C" >C

		<input type="checkbox" name="skills" value="Python" >Python

		<input type="checkbox" name="skills" value="Java" >Java

		<input type="checkbox" name="skills" value="JavaScript" >JavaScript

		<br><br><br>

		Email :<input type="email" name="email"><br><br><br>
		
		DOB :<input type="date" name="dob"><br><br><br>

		upload Resume here <input type="file" name="resume"><br><br>

		<input type="Submit" value="Submit"><br><br>

		Quantity : <input type="number" name="num" min ="2" max="20" step="2">


		<br><br>


		<input type="Reset" value="Reset"><br><br>

		
	</form>



</body>
</html>
